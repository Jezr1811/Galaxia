<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>La Galaxia de Maricela ✨</title>
  <style>
    body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #canvas-container { position: fixed; inset: 0; }
    
    .center-text {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
      text-align: center;
      pointer-events: none; 
      text-shadow: 0 0 15px #ff69b4, 0 0 30px #ff1493;
      z-index: 50;
      transition: opacity 1s;
      width: 85%;
    }

    .hud {
      position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
      background: rgba(10, 10, 20, 0.7); backdrop-filter: blur(10px);
      padding: 12px 20px; border-radius: 50px; border: 1px solid rgba(255,105,180,0.3);
      display: flex; gap: 12px; align-items: center; color: white; z-index: 100;
    }
    button {
      background: #ff69b4; border: none; padding: 8px 16px; border-radius: 20px;
      color: white; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    button:hover { background: #ff1493; transform: scale(1.05); }
    input[type=file] { display: none; }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

<div id="dynamic-center-text" class="center-text">Es tu universo</div>

<div class="hud">
  <span style="font-size:14px">✨ Galaxia </span>
  <button id="playBtn">▶ Iniciar</button>
  <button id="pickBtn">Música</button> <input type="file" id="pickFile" accept="audio/*">
  <audio id="audio" loop><source src="Te_invito.mp3" type="audio/mpeg"></audio>
</div>

<div id="canvas-container"></div>

<script>
let scene, camera, renderer, controls, points, phrasesGroup;

const params = {
  count: 65000,
  size: 0.016,
  radius: 5,
  branches: 3,
  spin: 1.3,
  randomness: 0.25,
  colorInside: '#1e90ff', 
  colorOutside: '#4b0082'
};

const phrases = [
  'la pequeña gigante de mi corazón ❤️', 'La chiquita más linda 🐣', 'Tan pequeña y tan inmensa ✨',
  'Lo bueno viene en frasco pequeño 🎁', 'Mi miniatura favorita 🧸', 'Eres mi tamaño ideal 🤗',
  'Pequeñita, pero eres mi mundo entero 🌎', 'Tu estatura es perfecta para mis abrazos 🤗',
  'Mi gran amor en versión pequeña 💖', 'Eres mi juguete favorito 🧸', 'Tan pequeña y ya no cabes en mis pensamientos 💭',
  'Lo más grande de mi vida es alguien pequeñito ✨', 'Eres mi pequeño gran milagro ✨', 'Un tesoro pequeño para cuidar por siempre 💎',
  'Eres mi punto favorito en el mapa 📍', 'Tan chiquita y me llenas el alma 🌟', 'Mi pequeña dosis de felicidad 💊',
  'Mi crespa hermosa 🌀', 'Tus ricitos me encantan ✨', 'Crespa divina 😍', 'Tus ricitos son como estrellas ✨',
  'Tu sonrisa es mi motor 😊', 'Esa carita tan linda. 🫠', 'Tus ojos brillan más que estas estrellas ✨',
  'Ojitos que me enamoran 😍', 'Tan linda que no es real 💭', 'Eres arte 🎨', 'Amo tus crespos rebeldes 🌀',
  'Cada ricitos tuyo es una constelación 🌌', 'Tus rulos tienen mi corazón enredado 🧶', 'La dueña de los ricitos más bellos 👑',
  'Tu pelo tiene vida propia y me encanta 🌀', 'Esa mirada que me desarma 👀', 'Perfección en cada curva de tu pelo ✨',
  'Eres mi obra maestra favorita 🖼️', 'Tu carita es mi paisaje preferido 🌄', 'Tus labios, mi perdición 💋',
  'Mi amor ❤️', 'Mi cielo 🌌', 'Eres mi todo ✨', 'Mi vida 💖', 'Te quiero infinito ♾️', 
  'Mi tesoro 💎', 'Siempre tú', 'Anhelo tu sonrisa 😊', 'Gracias por estar 🙏', 
  'Me haces el más feliz 💖', 'Contigo el mundo es mejor 🌎', 'Mi lugar favorito es contigo 🏠', 
  'Mi razón de sonreír 😊', 'Mi calma en el caos 🌊', 'Mi lugar seguro 🫶', 'Eres mi paz 🕊️',
  'Eres un sueño hecho realidad 🌙', 'Eres perfecta para mí 💘', 'Mi felicidad eres tú 😄',
  'Mi corazón te eligió 💓', 'Eres lo más bonito que tengo 🌷', 'Inseparables hoy y siempre 💞',
  'Mi hogar son tus brazos 🏠', 'Elegirte fue mi mejor acierto ✅', 'Te amo más de lo que las palabras dicen 🗣️',
  'Eres mi "por siempre" ♾️', 'Mi vida es más linda si estás tú 🌸', 'Eres mi debilidad favorita 🫠',
  'Cada segundo contigo es un regalo 🎁', 'Eres mi pensamiento constante 💭',
  'Orbitando en tu amor 🪐', 'Mi universo eres tú 🌌', 'Luz de mi vida 🕯️', 
  'Más allá del infinito 🚀', 'Un millón de galaxias y te elijo a ti ✨', 'Nuestra propia galaxia 💫',
  'Mi estrella favorita ⭐', 'Eres magia pura ✨', 'Mi pedacito de cielo ☁️', 
  'Eres mi destino 💫', 'Mi sueño más lindo 🌙', 'Tú haces que mi mundo gire 🌀',
  'Nuestra conexión es de otro planeta 👽', 'Brillas más que el sol ☀️', 'Mi eclipse favorito 🌑',
  'Eres el centro de mi gravedad 🌌', 'Un viaje a las estrellas a tu lado 🚀', 'Nuestra historia está escrita en el cielo ✍️',
  'Tacita de cafe con leche ☕️', 'Guapa 😍', 'Reinita 👑', 'Dulzura infinita 🍯', 
  'Mi alegría diaria ☀️', 'Mi todo bonito 💖', 'Mi casualidad favorita 🍀', 
  'Mi abrazo favorito 🤗', 'Eres mi canción favorita 🎶', 'Eres mi notificación preferida 📱',
  'Amo nuestros momentos juntos ⏳', 'Eres mi sol en días nublados ☁️', 'Mi postre favorito 🍰',
  'Eres mi vitamina diaria 💊', 'Tu risa es mi melodía preferida 🎵', 'Contigo todo es más dulce 🍭',
];

function init() {
  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  camera.position.set(4, 3, 5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  generateGalaxy();
  addPhrases();
  animate();
}

function generateGalaxy() {
  const geometry = new THREE.BufferGeometry();
  const positions = new Float32Array(params.count * 3);
  const colors = new Float32Array(params.count * 3);

  const colorInside = new THREE.Color(params.colorInside);
  const colorOutside = new THREE.Color(params.colorOutside);

  for(let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const radius = Math.random() * params.radius;
    const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;
    const spinAngle = radius * params.spin;

    const randomX = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
    const randomY = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;
    const randomZ = Math.pow(Math.random(), 3) * (Math.random() < 0.5 ? 1 : -1) * params.randomness * radius;

    positions[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
    positions[i3 + 1] = randomY;
    positions[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

    const mixedColor = colorInside.clone().lerp(colorOutside, radius / params.radius);
    colors[i3] = mixedColor.r;
    colors[i3 + 1] = mixedColor.g;
    colors[i3 + 2] = mixedColor.b;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: params.size,
    sizeAttenuation: true,
    depthWrite: false,
    blending: THREE.AdditiveBlending,
    vertexColors: true
  });

  points = new THREE.Points(geometry, material);
  scene.add(points);
}

function addPhrases() {
  phrasesGroup = new THREE.Group();
  phrases.forEach((text, i) => {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');

    canvas.width = 1024; 
    canvas.height = 256; 
    
    const isSpecial = text.includes('crespa') || text.includes('pequeña') || text.includes('ricitos');
    
    ctx.font = isSpecial ? 'Bold 42px Arial' : '32px Arial';

    ctx.fillStyle = '#ffffff';
    
    ctx.textAlign = 'center';
    
    ctx.shadowColor = 'rgba(138, 43, 226, 1)'; 
    ctx.shadowBlur = 12;
    

    ctx.fillText(text, 512, 128); 

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMaterial = new THREE.SpriteMaterial({ 
        map: texture, 
        transparent: true, 
        blending: THREE.AdditiveBlending 
    });
    const sprite = new THREE.Sprite(spriteMaterial);
    
    const angle = (i / phrases.length) * Math.PI * 2;
    const radiusVar = 1.2 + Math.random() * 3.8;
    const yVar = (Math.random() - 0.5) * 2;
    
    sprite.position.set(Math.cos(angle) * radiusVar, yVar, Math.sin(angle) * radiusVar);
    
    const scaleFactor = isSpecial ? 1.4 : 0.8 + Math.random() * 0.4;
    sprite.scale.set(scaleFactor, scaleFactor * 0.25, 1);
    
    phrasesGroup.add(sprite);
  });
  scene.add(phrasesGroup);
}
function animate() {
  requestAnimationFrame(animate);
  const time = Date.now() * 0.002;

  points.rotation.y += 0.0006;
  phrasesGroup.rotation.y += 0.0012;
  controls.update();
  renderer.render(scene, camera);
  
  // Latido del texto dinámico
  const pulseScale = 1 + Math.sin(time) * 0.1;
  const centerTextElement = document.getElementById('dynamic-center-text');
  if(centerTextElement) {
    centerTextElement.style.transform = `translate(-50%, -50%) scale(${pulseScale})`;
  }
}

const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
playBtn.onclick = () => {
  if (audio.paused) { audio.play(); playBtn.textContent = '⏸ Pausar'; }
  else { audio.pause(); playBtn.textContent = '▶ Iniciar'; }
};

document.getElementById('pickBtn').onclick = () => document.getElementById('pickFile').click();
document.getElementById('pickFile').onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    audio.src = URL.createObjectURL(file);
    audio.play();
    playBtn.textContent = '⏸ Pausar';
  }
};

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const centerPhrases = [
  "Para mi pequeña gigante 💖",
  "Maricela ✨",
  "Mi lugar favorito es contigo 🏠",
  "Eres mi sueño hecho realidad 🌙",
  "Nuestra propia galaxia 💫",
  "Te amo hasta el infinito ♾️",
  "Mi crespa hermosa 🌀"
];

let phraseIndex = 0;
function updateCenterText() {
  const centerTextElement = document.getElementById('dynamic-center-text');
  if(centerTextElement) {
    centerTextElement.style.opacity = 0;
    setTimeout(() => {
      phraseIndex = (phraseIndex + 1) % centerPhrases.length;
      centerTextElement.textContent = centerPhrases[phraseIndex];
      centerTextElement.style.opacity = 0.8;
    }, 1000);
  }
}

setInterval(updateCenterText, 5000);

init();
</script>
</body>
</html>
