function init() {
  scene = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.05);

  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);

  setupPostProcessing();

  controls = new THREE.OrbitControls(camera, renderer.domElement);

}

function setupPostProcessing() {
  if (!THREE.EffectComposer || !THREE.RenderPass || !THREE.UnrealBloomPass) {
    composer = null;
    bloomPass = null;
    return;
  }

  composer = new THREE.EffectComposer(renderer);
  composer.setSize(window.innerWidth, window.innerHeight);
  composer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  composer.addPass(new THREE.RenderPass(scene, camera));

  bloomPass = new THREE.UnrealBloomPass(
    new THREE.Vector2(window.innerWidth, window.innerHeight),
    params.bloomStrength,
    params.bloomRadius,
    params.bloomThreshold
  );
  composer.addPass(bloomPass);
}

function setupAudioAnalyser() {
  if (audioAnalyserReady) return;

  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) {
    frequencyData = new Uint8Array(512);
    return;
  }

  audioContext = new AudioContextClass();
  analyserNode = audioContext.createAnalyser();
  analyserNode.fftSize = 1024;
  analyserNode.smoothingTimeConstant = 0.82;
  frequencyData = new Uint8Array(analyserNode.frequencyBinCount);

  const captureStream = audio.captureStream || audio.mozCaptureStream;
  if (!captureStream) {
    analyserNode = null;
    audioAnalyserReady = true;
    return;
  }

  const stream = captureStream.call(audio);
  audioSourceNode = audioContext.createMediaStreamSource(stream);
  audioSourceNode.connect(analyserNode);
  audioAnalyserReady = true;
}

function createParticles() {
  const total = params.count * 3;
  currentPositions = new Float32Array(total);
  renderPositions = new Float32Array(total);
  morphStartPositions = new Float32Array(total);
  morphTargetPositions = new Float32Array(total);
  currentColors = new Float32Array(total);
  morphStartColors = new Float32Array(total);
  morphTargetColors = new Float32Array(total);
  particleSeeds = new Float32Array(params.count * 4);

  createParticleSeeds();

  Object.keys(shapeFactories).forEach((id) => {
    const positions = new Float32Array(total);
    const colors = new Float32Array(total);
    shapeFactories[id](positions, colors);
    shapePositions[id] = positions;
    shapeColors[id] = colors;
  });

  currentPositions.set(shapePositions[0]);
  renderPositions.set(currentPositions);
  currentColors.set(shapeColors[0]);

  particleGeometry = new THREE.BufferGeometry();
  particleGeometry.setAttribute("position", new THREE.BufferAttribute(renderPositions, 3));
  particleGeometry.setAttribute("color", new THREE.BufferAttribute(currentColors, 3));
  particleGeometry.attributes.position.setUsage(THREE.DynamicDrawUsage);
  particleGeometry.attributes.color.setUsage(THREE.DynamicDrawUsage);

  const material = new THREE.PointsMaterial({
    size: params.size,
    sizeAttenuation: true,
    depthWrite: false,
    transparent: true,
    opacity: 0.92,
    blending: THREE.AdditiveBlending,
    vertexColors: true
  });

  points = new THREE.Points(particleGeometry, material);
  scene.add(points);
}

function createParticleSeeds() {
  for (let i = 0; i < params.count; i++) {
    const i4 = i * 4;
    particleSeeds[i4] = Math.random();
    particleSeeds[i4 + 1] = Math.random();
    particleSeeds[i4 + 2] = Math.random();
    particleSeeds[i4 + 3] = Math.random() < 0.5 ? -1 : 1;
  }
}

function createGalaxyShape(targetArray, colorsArray) {
  const colorInside = colorTempA.set(params.colorInside);
  const colorOutside = colorTempB.set(params.colorOutside);

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const seedC = particleSeeds[i4 + 2];
    const sign = particleSeeds[i4 + 3];
    const radius = seedA * params.radius;
    const branchAngle = (i % params.branches) / params.branches * Math.PI * 2;
    const spinAngle = radius * params.spin;
    const randomPower = seedB * seedB * seedB;

    const randomX = randomPower * sign * params.randomness * radius;
    const randomY = Math.pow(seedC, 3) * (seedB < 0.5 ? -1 : 1) * params.randomness * radius * 0.78;
    const randomZ = Math.pow(1 - seedB, 3) * (seedC < 0.5 ? -1 : 1) * params.randomness * radius;

    targetArray[i3] = Math.cos(branchAngle + spinAngle) * radius + randomX;
    targetArray[i3 + 1] = randomY;
    targetArray[i3 + 2] = Math.sin(branchAngle + spinAngle) * radius + randomZ;

    if (colorsArray) {
      colorTempMixed.copy(colorInside).lerp(colorOutside, radius / params.radius);
      colorsArray[i3] = colorTempMixed.r;
      colorsArray[i3 + 1] = colorTempMixed.g;
      colorsArray[i3 + 2] = colorTempMixed.b;
    }
  }
}

function createHeartShape(targetArray, colorsArray) {
  // Filled Particle Sampling:
  // 1. Tomamos un punto del borde con la ecuación clásica del corazón.
  // 2. Interpolamos ese punto hacia un centro visual estable usando sqrt(seed),
  //    que distribuye mejor el área que una interpolación lineal pura.
  // 3. Agregamos un jitter mínimo para que se vea orgánico, pero mantenemos Z casi plano.
  const scale = 0.17;
  const centerY = -0.45;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const seedC = particleSeeds[i4 + 2];
    const sign = particleSeeds[i4 + 3];
    const t = seedA * Math.PI * 2;
    const sinT = Math.sin(t);

    const borderX = 16 * sinT * sinT * sinT;
    const borderY = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
    const fill = Math.sqrt(seedB);
    const densityBias = 0.72 + seedC * 0.28;
    const organicX = Math.sin(seedA * 41.0 + seedC * 17.0) * 0.028;
    const organicY = Math.cos(seedA * 37.0 + seedB * 19.0) * 0.028;

    targetArray[i3] = borderX * scale * fill * densityBias + organicX;
    targetArray[i3 + 1] = (borderY * scale - 0.2) * fill + centerY * (1 - fill) + organicY;
    targetArray[i3 + 2] = (seedC - 0.5) * 0.055 * sign;

    if (colorsArray) {
      const centerGlow = 1 - fill;
      const mix = 0.22 + centerGlow * 0.55 + seedC * 0.2;
      colorTempMixed.set(params.heartColorA).lerp(colorTempB.set(params.heartColorB), mix);
      colorsArray[i3] = colorTempMixed.r;
      colorsArray[i3 + 1] = colorTempMixed.g;
      colorsArray[i3 + 2] = colorTempMixed.b;
    }
  }
}

function createTorusShape(targetArray, colorsArray) {
  const majorRadius = 2.35;
  const minorRadius = 0.78;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const u = particleSeeds[i4] * Math.PI * 2;
    const v = particleSeeds[i4 + 1] * Math.PI * 2;
    const tubeNoise = 0.8 + particleSeeds[i4 + 2] * 0.45;
    const r = majorRadius + minorRadius * tubeNoise * Math.cos(v);

    targetArray[i3] = r * Math.cos(u);
    targetArray[i3 + 1] = minorRadius * tubeNoise * Math.sin(v);
    targetArray[i3 + 2] = r * Math.sin(u);

    if (colorsArray) {
      const mix = (Math.sin(u + v) + 1) * 0.5;
      colorTempMixed.set(params.torusColorA).lerp(colorTempB.set(params.torusColorB), mix);
      colorsArray[i3] = colorTempMixed.r;
      colorsArray[i3 + 1] = colorTempMixed.g;
      colorsArray[i3 + 2] = colorTempMixed.b;
    }
  }
}

function createPrismShape(targetArray, colorsArray) {
  // Prisma hexagonal: dos tapas paralelas y seis caras laterales.
  // La distribución mezcla caras, aristas y vértices para una lectura sólida y tecnológica.
  const sides = 6;
  const radius = 2.45;
  const halfHeight = 1.55;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const seedC = particleSeeds[i4 + 2];
    const sign = particleSeeds[i4 + 3];
    const mode = seedC;
    const side = Math.floor(seedA * sides) % sides;
    const local = seedA * sides - side;
    const angleA = side / sides * Math.PI * 2;
    const angleB = (side + 1) / sides * Math.PI * 2;
    const ax = Math.cos(angleA) * radius;
    const az = Math.sin(angleA) * radius;
    const bx = Math.cos(angleB) * radius;
    const bz = Math.sin(angleB) * radius;
    const edgeX = ax + (bx - ax) * local;
    const edgeZ = az + (bz - az) * local;
    let x, y, z;

    if (mode < 0.48) {
      // Caras laterales: puntos sobre el borde angular, repartidos en toda la altura.
      x = edgeX;
      z = edgeZ;
      y = -halfHeight + seedB * halfHeight * 2;
    } else if (mode < 0.72) {
      // Tapas: interpolación radial hacia el centro para que el prisma no sea hueco.
      const capFill = Math.sqrt(seedB);
      x = edgeX * capFill;
      z = edgeZ * capFill;
      y = sign > 0 ? halfHeight : -halfHeight;
    } else if (mode < 0.94) {
      // Aristas verticales y de tapas con mayor densidad visual.
      if (seedB < 0.55) {
        x = ax;
        z = az;
        y = -halfHeight + local * halfHeight * 2;
      } else {
        x = edgeX;
        z = edgeZ;
        y = sign > 0 ? halfHeight : -halfHeight;
      }
    } else {
      x = ax;
      z = az;
      y = sign > 0 ? halfHeight : -halfHeight;
    }

    targetArray[i3] = x;
    targetArray[i3 + 1] = y;
    targetArray[i3 + 2] = z;

    if (colorsArray) {
      const mix = 0.18 + Math.abs(y / halfHeight) * 0.34 + seedC * 0.35;
      colorTempMixed.set(params.prismColorA).lerp(colorTempB.set(params.prismColorB), mix);
      colorsArray[i3] = colorTempMixed.r;
      colorsArray[i3 + 1] = colorTempMixed.g;
      colorsArray[i3 + 2] = colorTempMixed.b;
    }
  }
}

function createPyramidShape(targetArray, colorsArray) {
  // Pirámide cuadrada: base en Y negativa, vértice superior y caras triangulares.
  // El sampling usa coordenadas baricéntricas simples para poblar caras y volumen interno.
  const halfBase = 2.45;
  const baseY = -1.45;
  const apexY = 2.2;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const seedC = particleSeeds[i4 + 2];
    const sign = particleSeeds[i4 + 3];
    const side = Math.floor(seedA * 4) % 4;
    const local = seedA * 4 - side;
    let x, z;
    let y;

    if (seedC < 0.58) {
      // Caras triangulares: base-edge -> vértice superior.
      const ax = pyramidCornerX(side, halfBase);
      const az = pyramidCornerZ(side, halfBase);
      const bx = pyramidCornerX((side + 1) % 4, halfBase);
      const bz = pyramidCornerZ((side + 1) % 4, halfBase);
      const edgeX = ax + (bx - ax) * local;
      const edgeZ = az + (bz - az) * local;
      const rise = Math.sqrt(seedB);
      x = edgeX * (1 - rise);
      z = edgeZ * (1 - rise);
      y = baseY + (apexY - baseY) * rise;
    } else if (seedC < 0.76) {
      // Base cuadrada rellena.
      x = (seedA - 0.5) * halfBase * 2;
      z = (seedB - 0.5) * halfBase * 2;
      y = baseY;
    } else if (seedC < 0.94) {
      // Aristas desde esquinas hacia el vértice.
      const cornerX = pyramidCornerX(side, halfBase);
      const cornerZ = pyramidCornerZ(side, halfBase);
      const rise = local;
      x = cornerX * (1 - rise);
      z = cornerZ * (1 - rise);
      y = baseY + (apexY - baseY) * rise;
    } else {
      x = 0;
      z = 0;
      y = apexY;
    }

    targetArray[i3] = x;
    targetArray[i3 + 1] = y;
    targetArray[i3 + 2] = z;

    if (colorsArray) {
      const heightMix = (y - baseY) / (apexY - baseY);
      const mix = heightMix * 0.55 + seedC * 0.32;
      colorTempMixed.set(params.pyramidColorA).lerp(colorTempB.set(params.pyramidColorB), mix);
      colorsArray[i3] = colorTempMixed.r;
      colorsArray[i3 + 1] = colorTempMixed.g;
      colorsArray[i3 + 2] = colorTempMixed.b;
    }
  }
}

function pyramidCornerX(index, halfBase) {
  return index === 0 || index === 3 ? -halfBase : halfBase;
}

function pyramidCornerZ(index, halfBase) {
  return index < 2 ? -halfBase : halfBase;
}

function startMorph(nextShapeId) {
  nextShapeId = Number(nextShapeId);
  if (!shapePositions[nextShapeId] || nextShapeId === targetShape && isMorphing) return;

  morphStartPositions.set(currentPositions);
  morphTargetPositions.set(shapePositions[nextShapeId]);
  morphStartColors.set(currentColors);
  morphTargetColors.set(shapeColors[nextShapeId]);
  morphProgress = 0;
  morphStartTime = clock.elapsedTime;
  targetShape = nextShapeId;
  isMorphing = true;
  shapeName.textContent = shapeMap[nextShapeId];
}

function morphParticles(elapsedTime) {
  if (!isMorphing) return;

  morphProgress = Math.min((elapsedTime - morphStartTime) / params.morphDuration, 1);
  const t = easeInOutCubic(morphProgress);

  for (let i = 0; i < currentPositions.length; i++) {
    currentPositions[i] = morphStartPositions[i] + (morphTargetPositions[i] - morphStartPositions[i]) * t;
    currentColors[i] = morphStartColors[i] + (morphTargetColors[i] - morphStartColors[i]) * t;
  }

  particleGeometry.attributes.color.needsUpdate = true;

  if (morphProgress >= 1) {
    currentShape = targetShape;
    currentPositions.set(shapePositions[currentShape]);
    currentColors.set(shapeColors[currentShape]);
    isMorphing = false;
  }
}

function updateAudioReactiveEffects(elapsedTime, deltaTime) {
  updateAudioBands();

  const bass = audioBands.bass;
  const mid = audioBands.mid;
  const high = audioBands.high;
  const activeShape = isMorphing ? targetShape : currentShape;
  const positionAttribute = particleGeometry.attributes.position;
  const positions = positionAttribute.array;

  if (activeShape === 0) {
    updateGalaxyAudioMotion(positions, elapsedTime, bass, mid, high, deltaTime);
  } else if (activeShape === 1) {
    updateHeartAudioMotion(positions, elapsedTime, bass, mid, high);
  } else if (activeShape === 2) {
    updateTorusAudioMotion(positions, elapsedTime, bass, mid, high);
  } else if (activeShape === 3) {
    updatePrismAudioMotion(positions, elapsedTime, bass, mid, high, deltaTime);
  } else if (activeShape === 4) {
    updatePyramidAudioMotion(positions, elapsedTime, bass, mid, high, deltaTime);
  } else {
    positions.set(currentPositions);
  }

  positionAttribute.needsUpdate = true;
}

function updateAudioBands() {
  if (!analyserNode || !frequencyData) {
    audioBands.bass *= 0.94;
    audioBands.mid *= 0.94;
    audioBands.high *= 0.94;
    audioBands.overall *= 0.94;
    return;
  }

  analyserNode.getByteFrequencyData(frequencyData);

  audioBands.bass = averageFrequencyRange(0, 8);
  audioBands.mid = averageFrequencyRange(9, 42);
  audioBands.high = averageFrequencyRange(43, 120);
  audioBands.overall = (audioBands.bass + audioBands.mid + audioBands.high) / 3;
}

function averageFrequencyRange(from, to) {
  let sum = 0;
  const end = Math.min(to, frequencyData.length - 1);
  for (let i = from; i <= end; i++) sum += frequencyData[i];
  return sum / ((end - from + 1) * 255);
}

function updateGalaxyAudioMotion(positions, elapsedTime, bass, mid, high, deltaTime) {
  const expansion = 1 + mid * 0.18 + high * 0.11;
  const twist = elapsedTime * (0.16 + high * 0.22);
  const wavePower = 0.06 + high * 0.16;

  points.rotation.y += deltaTime * (0.055 + mid * 0.14);
  points.rotation.z = Math.sin(elapsedTime * 0.17) * 0.08;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const sx = currentPositions[i3];
    const sy = currentPositions[i3 + 1];
    const sz = currentPositions[i3 + 2];
    const seed = particleSeeds[i4];
    const angle = twist + seed * Math.PI * 2;
    const wave = Math.sin(elapsedTime * 2.2 + seed * 16.0) * wavePower;

    positions[i3] = sx * expansion + Math.cos(angle) * wave;
    positions[i3 + 1] = sy + Math.sin(elapsedTime * 1.7 + seed * 10.0) * (0.035 + high * 0.08);
    positions[i3 + 2] = sz * expansion + Math.sin(angle) * wave;
  }
}

function updateHeartAudioMotion(positions, elapsedTime, bass, mid, high) {
  const heartbeat = Math.pow(Math.max(0, bass), 1.45);
  const pulse = 1 + heartbeat * 0.34 + Math.sin(elapsedTime * 3.0) * 0.018;
  const breathe = 0.025 + bass * 0.08;

  points.rotation.y = Math.sin(elapsedTime * 0.35) * 0.28;
  points.rotation.x = Math.sin(elapsedTime * 0.2) * 0.08;
  points.rotation.z = 0;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const sx = currentPositions[i3];
    const sy = currentPositions[i3 + 1];
    const sz = currentPositions[i3 + 2];
    const seed = particleSeeds[i4];
    const organic = Math.sin(elapsedTime * 2.4 + seed * 19.0) * breathe;

    positions[i3] = sx * (pulse + organic * 0.45);
    positions[i3 + 1] = sy * (pulse + organic * 0.3) + heartbeat * 0.08;
    positions[i3 + 2] = sz * (1 + heartbeat * 0.55) + Math.cos(elapsedTime * 2.0 + seed * 12.0) * (0.015 + mid * 0.04);
  }
}

function updateTorusAudioMotion(positions, elapsedTime, bass, mid, high) {
  const radialPulse = 1 + bass * 0.13 + mid * 0.08;
  const waveSpeed = elapsedTime * (2.2 + high * 4.0);
  const waveAmp = 0.055 + audioBands.overall * 0.22;

  points.rotation.y += 0.004 + high * 0.018;
  points.rotation.x = Math.sin(elapsedTime * 0.28) * 0.38;
  points.rotation.z = Math.cos(elapsedTime * 0.21) * 0.13;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const sx = currentPositions[i3];
    const sy = currentPositions[i3 + 1];
    const sz = currentPositions[i3 + 2];
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const wave = Math.sin(waveSpeed + seedA * Math.PI * 8.0 + seedB * 6.0) * waveAmp;
    const scale = radialPulse + wave;

    positions[i3] = sx * scale;
    positions[i3 + 1] = sy * (1 + wave * 1.4 + mid * 0.1);
    positions[i3 + 2] = sz * scale;
  }
}

function updatePrismAudioMotion(positions, elapsedTime, bass, mid, high, deltaTime) {
  const expansion = 1 + mid * 0.1 + high * 0.14;
  const waveSpeed = elapsedTime * (1.8 + high * 3.5);
  const vibration = 0.018 + high * 0.07;

  points.rotation.y += deltaTime * (0.16 + high * 0.42);
  points.rotation.x = 0.42 + Math.sin(elapsedTime * 0.22) * 0.16;
  points.rotation.z = Math.cos(elapsedTime * 0.2) * 0.08;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const sx = currentPositions[i3];
    const sy = currentPositions[i3 + 1];
    const sz = currentPositions[i3 + 2];
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const angularWave = Math.sin(waveSpeed + seedA * 18.0) * vibration;
    const verticalWave = Math.cos(elapsedTime * 2.6 + seedB * 11.0) * (0.01 + mid * 0.035);

    positions[i3] = sx * (expansion + angularWave);
    positions[i3 + 1] = sy * (1 + mid * 0.08) + verticalWave;
    positions[i3 + 2] = sz * (expansion - angularWave * 0.45);
  }
}

function updatePyramidAudioMotion(positions, elapsedTime, bass, mid, high, deltaTime) {
  const bassHit = Math.pow(Math.max(0, bass), 1.25);
  const radialPulse = 1 + bassHit * 0.18 + mid * 0.035;
  const verticalPulse = 1 + bassHit * 0.24;
  const tremorSpeed = elapsedTime * (2.0 + bassHit * 4.0);

  points.rotation.y += deltaTime * (0.12 + bassHit * 0.24);
  points.rotation.x = 0.18 + Math.sin(elapsedTime * 0.18) * 0.14;
  points.rotation.z = Math.sin(elapsedTime * 0.14) * 0.05;

  for (let i = 0; i < params.count; i++) {
    const i3 = i * 3;
    const i4 = i * 4;
    const sx = currentPositions[i3];
    const sy = currentPositions[i3 + 1];
    const sz = currentPositions[i3 + 2];
    const seedA = particleSeeds[i4];
    const seedB = particleSeeds[i4 + 1];
    const tremor = Math.sin(tremorSpeed + seedA * 17.0 + seedB * 5.0) * (0.012 + bassHit * 0.06);

    positions[i3] = sx * (radialPulse + tremor);
    positions[i3 + 1] = sy * verticalPulse + tremor * 0.65;
    positions[i3 + 2] = sz * (radialPulse + tremor);
  }
}

function addPhrases() {
  phrasesGroup = new THREE.Group();

  phrases.forEach((text, i) => {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 1024;
    canvas.height = 256;

    const normalized = text.toLowerCase();
    const isSpecial = normalized.includes("crespa") || normalized.includes("pequeña") || normalized.includes("ricitos");

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.font = isSpecial ? "bold 42px Arial" : "32px Arial";
    ctx.fillStyle = "#ffffff";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(138, 43, 226, 1)";
    ctx.shadowBlur = 12;
    ctx.fillText(text, 512, 128);

    const texture = new THREE.CanvasTexture(canvas);
    const spriteMaterial = new THREE.SpriteMaterial({
      map: texture,
      transparent: true,
      opacity: 0.72,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });
    const sprite = new THREE.Sprite(spriteMaterial);

    const angle = (i / phrases.length) * Math.PI * 2;
    const radiusVar = 1.2 + Math.random() * 3.8;
    const yVar = (Math.random() - 0.5) * 2;

    sprite.position.set(Math.cos(angle) * radiusVar, yVar, Math.sin(angle) * radiusVar);

    const scaleFactor = isSpecial ? 1.4 : 0.8 + Math.random() * 0.4;
    sprite.scale.set(scaleFactor * 2, scaleFactor * 0.5, 1);

    phrasesGroup.add(sprite);
  });

  scene.add(phrasesGroup);
}

function bindUI() {
  playBtn.onclick = togglePlayback;
  pickBtn.onclick = nextSongAndShape;

  // Atajo opcional: doble clic en el botón musical para cargar un archivo local.
  pickBtn.ondblclick = () => pickFile.click();
  pickFile.onchange = handlePickedAudioFile;

  window.addEventListener("resize", onWindowResize);
}

function togglePlayback() {
  if (audio.paused) {
    playAudio();
  } else {
    audio.pause();
    playBtn.textContent = "▶ Iniciar";
  }
}

async function playAudio() {
  try {
    audio.muted = false;
    audio.volume = 1;

    if (!audio.src) {
      setAudioTrack(songs[currentSongIndex]);
    }

    await audio.play();
    setupAudioAnalyser();
    if (audioContext && audioContext.state !== "running") {
      await audioContext.resume();
    }
    playBtn.textContent = "⏸ Pausar";
  } catch (error) {
    console.warn("Reintentando reproducción de audio:", error);
    try {
      audio.load();
      await audio.play();
      playBtn.textContent = "⏸ Pausar";
    } catch (retryError) {
      console.error("No se pudo reproducir el audio:", retryError);
      playBtn.textContent = "▶ Iniciar";
    }
  }
}

function nextSongAndShape() {
  currentSongIndex = (currentSongIndex + 1) % songs.length;
  loadSong(currentSongIndex, true);
}

function loadSong(index, autoplay) {
  const song = songs[index];
  const wasPlaying = autoplay || !audio.paused;

  setAudioTrack(song);

  updateSongUI();
  startMorph(song.shapeId);

  if (wasPlaying) playAudio();
}

function setAudioTrack(song) {
  const currentFile = decodeURIComponent(audio.currentSrc || audio.src || "");
  if (!currentFile.endsWith(song.src)) {
    audio.pause();
    audio.src = encodeURI(song.src);
    audio.load();
  }
  audio.muted = false;
  audio.volume = 1;
}

function handlePickedAudioFile(event) {
  const file = event.target.files[0];
  if (!file) return;

  const objectUrl = URL.createObjectURL(file);
  audio.src = objectUrl;
  audio.loop = true;

  const nextShapeId = (currentShape + 1) % Object.keys(shapeMap).length;
  songs[currentSongIndex] = {
    title: "🎵 " + file.name,
    src: objectUrl,
    shapeId: nextShapeId
  };

  updateSongUI();
  startMorph(nextShapeId);
  playAudio();
}

function updateSongUI() {
  const song = songs[currentSongIndex];
  songLabel.textContent = song.title;
  shapeName.textContent = shapeMap[song.shapeId];
  applySongTheme(song);
}

function applySongTheme(song) {
  if (!song.theme) return;

  document.documentElement.style.setProperty("--blue", song.theme.accent);
  document.documentElement.style.setProperty("--pink", song.theme.glow);
  document.documentElement.style.setProperty("--hot-pink", song.theme.glow);

  songLabel.style.background = song.theme.accent;
  shapeName.style.textShadow = "0 0 15px " + song.theme.glow;

  const centerTextElement = document.getElementById("dynamic-center-text");
  if (centerTextElement) {
    centerTextElement.style.textShadow = "0 0 16px " + song.theme.glow + ", 0 0 34px " + song.theme.accent;
  }

  if (points && points.material) {
    points.material.size = song.theme.particleSize || params.size;
    points.material.needsUpdate = true;
  }

  if (bloomPass) {
    bloomPass.strength = song.theme.bloom || params.bloomStrength;
    bloomPass.radius = params.bloomRadius;
    bloomPass.threshold = params.bloomThreshold;
  }
}

function updateCenterText() {
  const centerTextElement = document.getElementById("dynamic-center-text");
  if (!centerTextElement) return;

  centerTextElement.style.opacity = 0;
  setTimeout(() => {
    phraseIndex = (phraseIndex + 1) % centerPhrases.length;
    centerTextElement.textContent = centerPhrases[phraseIndex];
    centerTextElement.style.opacity = 0.86;
  }, 1000);
}

function updateCenterTextPulse(elapsedTime) {
  const centerTextElement = document.getElementById("dynamic-center-text");
  if (!centerTextElement) return;

  const bassPulse = audioBands.bass * 0.08;
  const pulseScale = 1 + Math.sin(elapsedTime * 2.0) * 0.06 + bassPulse;
  centerTextElement.style.transform = "translate(-50%, -50%) scale(" + pulseScale.toFixed(3) + ")";
}

function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function onWindowResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  if (composer) composer.setSize(window.innerWidth, window.innerHeight);
  if (bloomPass) bloomPass.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
  requestAnimationFrame(animate);

  const deltaTime = Math.min(clock.getDelta(), 0.033);
  const elapsedTime = clock.elapsedTime;

  morphParticles(elapsedTime);
  updateAudioReactiveEffects(elapsedTime, deltaTime);

  phrasesGroup.rotation.y += deltaTime * (0.16 + audioBands.high * 0.14);
  phrasesGroup.rotation.x = Math.sin(elapsedTime * 0.11) * 0.06;

  controls.update();
  updateCenterTextPulse(elapsedTime);
  if (composer) {
    composer.render();
  } else {
    renderer.render(scene, camera);
  }
}

setInterval(updateCenterText, 5000);
init();
</script>

<!--
CHANGELOG / MODIFICACIONES

Funciones existentes modificadas:
- generateGalaxy() fue reemplazada por createParticles() + createGalaxyShape().
  Ahora la geometría se crea una sola vez con BufferGeometry, Float32Array y DynamicDrawUsage.
- animate() fue refactorizada para separar morphParticles(), updateAudioReactiveEffects(),
  controles, frases y render.
- El botón pickBtn ya no abre inmediatamente el selector de archivo: ahora cambia canción,
  actualiza audio y dispara el morphing. Doble clic en ese mismo botón abre el selector local.
- El audio HTML se conecta ahora con Web Audio nativo: AudioContext,
  MediaElementSource y AnalyserNode. Esto mantiene el sonido del <audio>
  y conserva el FFT para las partículas.

Nuevas variables de estado:
- currentShape: id de la forma visual actualmente estable.
- targetShape: id de la forma hacia la que viajan las partículas.
- morphProgress: progreso normalizado de 0 a 1.
- isMorphing: indica si una transición está activa.
- morphStartTime: tiempo de inicio de la transición.
- currentPositions: buffer base interpolado entre formas.
- renderPositions: buffer dinámico que recibe deformación FFT por frame.
- morphStartPositions / morphTargetPositions: buffers reutilizables para LERP.
- currentColors / morphStartColors / morphTargetColors: buffers reutilizables para
  transicionar paletas sin recrear materiales.
- shapePositions: mapa con posiciones precalculadas para galaxy, heart y torus.
- shapeColors: mapa con colores precalculados por forma.
- audioBands: bandas bass, mid, high y overall calculadas desde FFT.

Cómo conectar tu array actual de canciones:
- Edita const songs = [...].
- Cada canción debe tener:
  { title: "Nombre visible", src: "archivo.mp3", shapeId: 0 }
- shapeId usa el mapa:
  0 = galaxy
  1 = heart
  2 = torus

Cómo conectar AudioAnalyser y FFT:
- setupAudioAnalyser() toma el elemento <audio id="audio"> existente.
- analyserNode.getByteFrequencyData() llena frequencyData en cada frame.
- updateAudioBands() divide el FFT en bass, mid y high.
- updateAudioReactiveEffects() aplica una deformación distinta según la forma activa.

Cómo conectar el botón con ícono de música:
- pickBtn.onclick = nextSongAndShape.
- nextSongAndShape() avanza currentSongIndex.
- loadSong() cambia audio.src, actualiza la UI y llama startMorph(song.shapeId).

Cómo activar manualmente cambio de canción y morphing:
- loadSong(1, true) carga la canción 2, reproduce y activa su forma.
- startMorph(1) activa manualmente el corazón sin cambiar audio.
- startMorph(2) activa manualmente el toroide sin cambiar audio.

Cómo agregar formas futuras:
- Registra el nombre:
  shapeMap[3] = "lorenz";
- Registra la fábrica:
  shapeFactories[3] = createLorenzShape;
- Crea una función:
  function createLorenzShape(targetArray, colorsArray) { ... }
- Dentro usa targetArray[i3], targetArray[i3 + 1], targetArray[i3 + 2].
- Evita crear THREE.Vector3 u objetos dentro del render loop.
-->
